<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Item Simples – Admin Niko Trudel</title>
  <style>
    .form-card {
      background: #fff;
      border-radius: 16px;
      border: 1.5px solid #E5E7EB;
      padding: 28px;
      max-width: 640px;
    }

    .img-preview {
      width: 100%; height: 200px;
      border-radius: 12px;
      background: #F7F5EF;
      border: 2px dashed #D1D5DB;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; cursor: pointer;
      overflow: hidden; position: relative;
      transition: border-color .15s;
    }
    .img-preview:hover { border-color: #7C3AED; }
    .img-preview img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
    .img-preview .overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,.45);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: white; gap: 4px; opacity: 0;
      transition: opacity .15s;
    }
    .img-preview:hover .overlay { opacity: 1; }
    .img-preview i { font-size: 32px; color: #9CA3AF; }
    .img-preview span { font-size: 13px; color: #9CA3AF; font-weight: 600; }

    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      color: #6B7280; font-size: 13px; font-weight: 600;
      text-decoration: none; margin-bottom: 20px;
      background: none; border: none; cursor: pointer;
      padding: 0; font-family: 'Nunito', sans-serif;
    }
    .back-btn:hover { color: #7C3AED; }

    .loading-overlay {
      position: fixed; inset: 0; background: rgba(255,255,255,.8);
      display: none; align-items: center; justify-content: center;
      z-index: 999; font-size: 15px; font-weight: 700;
      color: #7C3AED; gap: 10px;
    }
    .loading-overlay.show { display: flex; }
  </style>
  <link rel="stylesheet" href="/public/assets/css/item-simples.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>
<body>
  <div class="layout" id="app"></div>

  <div class="loading-overlay" id="loadingOverlay">
    <i class="bi bi-arrow-repeat" style="animation:spin 1s linear infinite;font-size:22px;"></i>
    Salvando...
  </div>

  <div class="toast-container"></div>

  <style>@keyframes spin { to { transform: rotate(360deg); } }</style>

  <script type="module" src="/public/assets/js/item-simples.js"></script>
</body>
</html>
