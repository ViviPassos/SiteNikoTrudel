  <title>Niko Festas – Admin Niko Trudel</title>
  <style>
    .loading-overlay {
      position: fixed; inset: 0; background: rgba(255,255,255,.8);

      z-index: 999; font-size: 15px; font-weight: 700; color: #7C3AED; gap: 10px;

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

<body>

  </div>
  <div class="toast-container"></div>
  <script type="module" src="assets/js/item-montavel-nikofesta.js"></script>
