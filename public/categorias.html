<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Categorias – Admin Niko Trudel</title>
  <link rel="stylesheet" href="assets/css/categorias.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>
<body>
  <div class="layout" id="app"></div>

  <!-- Modal Nova/Editar Categoria -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Nova Categoria</h2>
        <button class="modal-close" id="closeModal"><i class="bi bi-x"></i></button>
      </div>
      <div class="form-group">
        <label class="form-label">Nome *</label>
        <input class="form-control" id="catNome" placeholder="Ex: Trudels" />
      </div>
      <div class="form-group">
        <label class="form-label">Slug (identificador único)</label>
        <input class="form-control" id="catSlug" placeholder="Ex: trudels" />
        <small style="color:#9CA3AF;font-size:11px;">Gerado automaticamente. Não altere ao editar.</small>
      </div>
      <div class="form-group">
        <label class="form-label">Ordem de exibição</label>
        <input class="form-control" id="catOrdem" type="number" value="0" />
      </div>
      <div class="modal-footer">
        <button class="btn-outline" id="cancelModal">Cancelar</button>
        <button class="btn-primary" id="saveModal"><i class="bi bi-check-lg"></i> Salvar</button>
      </div>
    </div>
  </div>

  <!-- Modal Confirmar Delete -->
  <div class="modal-overlay confirm-modal" id="confirmOverlay">
    <div class="modal" style="max-width:360px;">
      <div class="confirm-icon">🗑️</div>
      <div class="confirm-name" id="confirmName"></div>
      <div class="confirm-msg" style="margin-top:6px;">Deseja excluir esta categoria? Esta ação não pode ser desfeita.</div>
      <div class="modal-footer">
        <button class="btn-outline" id="confirmCancel">Cancelar</button>
        <button class="btn-primary" id="confirmOk" style="background:#EF4444;">Excluir</button>
      </div>
    </div>
  </div>

  <div class="toast-container"></div>

  <script type="module" src="assets/js/categorias.js"></script>
</body>
</html>
